<div class="bg-container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center">Login</h3>

    <input class="form-control my-2" placeholder="Username" [(ngModel)]="user.username">
    <input class="form-control my-2" type="password" placeholder="Password" [(ngModel)]="user.password">

    <button class="btn btn-primary w-100 mt-2" (click)="login()">Login</button>

    <p class="mt-3 text-center">
      <button class="btn btn-primary w-100 mt-2" routerLink="/register">Register</button>
    </p>

  </div>
</div>
