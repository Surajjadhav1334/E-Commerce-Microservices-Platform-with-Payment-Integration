<div class=" d-flex justify-content-center align-items-center vh-100 bg-container">
  <div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center">Register</h3>

    <input class="form-control my-2" placeholder="Username" [(ngModel)]="user.username" name="Username">
    <input class="form-control my-2" type="password" placeholder="Password" [(ngModel)]="user.password">

    <button class="btn btn-success w-100 mt-2" (click)="registerUser()">Register User</button>
    <button class="btn btn-danger w-100 mt-2" (click)="registerAdmin()">Register Admin</button>

    <p class="mt-3 text-center">
      <button class="btn btn-primary w-100 mt-2" routerLink="/login">Login</button>
    </p>

  </div>
</div>
